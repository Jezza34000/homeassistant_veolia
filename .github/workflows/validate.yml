name: "Validate"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  hassfest:
    name: "Hassfest"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout the repository"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # Version 6.0.3

      - name: "Run hassfest validation"
        uses: home-assistant/actions/hassfest@868e6cb4607727d764341a158d98872cd63fa658 # Version 11 September 2025

  hacs:
    name: "HACS"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout the repository"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # Version 6.0.3

      - name: "Run HACS validation"
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # Version 22.5.0
        with:
          category: "integration"
