name: "Release"

on:
  release:
    types:
      - "published"

permissions: {}

jobs:
  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
    steps:
      - name: "Checkout the repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # Version 7.0.0

      - name: "ZIP the integration directory"
        shell: "bash"
        run: |
          cd "${{ github.workspace }}/custom_components/veolia"
          zip veolia.zip -r ./

      - name: "Upload the ZIP file to the release"
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # Version 3.0.1
        with:
          files: ${{ github.workspace }}/custom_components/integration_blueprint/veolia.zip
